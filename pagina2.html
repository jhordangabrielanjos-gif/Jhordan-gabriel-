<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeria de Jhordan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
}

#loading{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.loader{
    width:120px;
    height:120px;
    border:8px solid #222;
    border-top:8px solid #00ff88;
    border-radius:50%;
    animation:girar 1s linear infinite;
}

@keyframes girar{
    100%{
        transform:rotate(360deg);
    }
}

#conteudo{
    display:none;
    padding:20px;
}

h1{
    text-align:center;
    color:#00ff88;
    margin:20px 0;
}

.galeria{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.galeria img{
    width:320px;
    max-width:90%;
    border-radius:15px;
    border:2px solid #00ff88;
    transition:.5s;
}

.galeria img:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #00ff88;
}

.botao{
    display:block;
    width:250px;
    margin:40px auto;
    text-align:center;
    text-decoration:none;
    background:#00ff88;
    color:#000;
    padding:15px;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="loading">
    <div class="loader"></div>
    <h2 style="color:#00ff88;margin-top:20px;">
        Carregando Galeria...
    </h2>
</div>

<div id="conteudo">

<h1>📸 Galeria de Jhordan 📸</h1>

<div class="galeria">
    <img width="320" height="500" alt="Image" src="https://github.com/user-attachments/assets/447b2a37-d934-47b6-abf7-1b126187fe9b">
    <img width="320" height="500" alt="Image" src="https://github.com/user-attachments/assets/963989d9-4206-436c-a234-e1a61e0f017a">
    <img width="320" height="500" alt="Image" src="https://github.com/user-attachments/assets/ff91737d-7c33-4097-a1af-9623b9a2d816">
    <img src="img/532f8dda6d2ae8743b8b3f4579f44c31.jpg">
</div>

<a href="index.html" class="botao">
⬅ Voltar ao Início
</a>

</div>

<script>
setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    document.getElementById("conteudo").style.display="block";
},3000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Tarefas - Jhordan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:20px;
}

.botao{
    display:block;
    width:250px;
    margin:40px auto;
    text-align:center;
    text-decoration:none;
    background:#00ff88;
    color:#000;
    padding:15px;
    border-radius:10px;
    font-weight:bold;
}

.container{
    width:100%;
    max-width:600px;
    background:#fff;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    color:#0f172a;
    margin-bottom:20px;
}

/* Área de adicionar tarefa */
.input-area{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    width:100%;
}

input{
    flex:4;
    width:100%;
    padding:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#0ea5e9;
}

button{
    flex:1;
    min-width:120px;
    border:none;
    background:#0ea5e9;
    color:#fff;
    padding:15px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#0284c7;
    transform:scale(1.03);
}

ul{
    list-style:none;
}

li{
    background:#f1f5f9;
    margin-bottom:10px;
    padding:15px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    animation:aparecer .4s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(-10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.tarefa{
    cursor:pointer;
    flex:1;
    word-break:break-word;
}

.concluida{
    text-decoration:line-through;
    opacity:.5;
}

.excluir{
    background:#ef4444;
    padding:8px 12px;
    border-radius:8px;
    min-width:45px;
}

.excluir:hover{
    background:#dc2626;
}

.info{
    text-align:center;
    margin-top:15px;
    color:#64748b;
    font-size:14px;
}

/* Responsivo para celular */
@media (max-width:600px){

    .container{
        padding:20px;
    }

    .input-area{
        flex-direction:column;
    }

    button{
        width:100%;
        min-width:100%;
    }

}

</style>
</head>
<body>

<div class="container">

    <h1>📝 Lista de Tarefas</h1>

    <div class="input-area">
        <input
            type="text"
            id="tarefa"
            placeholder="Digite uma tarefa..."
            onkeypress="if(event.key==='Enter') adicionarTarefa()"
        >

        <button onclick="adicionarTarefa()">
            Adicionar
        </button>
    </div>

    <ul id="lista"></ul>

    <p class="info">
        Clique em uma tarefa para marcar como concluída.
    </p>
<a href="index.html"  class="botao">
⬅ Voltar ao Início  
</a>

</div>

<script>

const lista = document.getElementById("lista");

function salvarTarefas(){
    localStorage.setItem("tarefasJhordan", lista.innerHTML);
}

function carregarTarefas(){
    lista.innerHTML = localStorage.getItem("tarefasJhordan") || "";
}

function adicionarTarefa(){

    const input = document.getElementById("tarefa");
    const texto = input.value.trim();

    if(texto === ""){
        alert("Digite uma tarefa!");
        return;
    }

    const li = document.createElement("li");

    li.innerHTML = `
        <span class="tarefa" onclick="concluir(this)">
            ${texto}
        </span>

        <button class="excluir" onclick="remover(this)">
            X
        </button>
    `;

    lista.appendChild(li);

    input.value = "";

    salvarTarefas();
}

function concluir(item){
    item.classList.toggle("concluida");
    salvarTarefas();
}

function remover(botao){
    botao.parentElement.remove();
    salvarTarefas();
}

carregarTarefas();

</script>

</body>
</html>
